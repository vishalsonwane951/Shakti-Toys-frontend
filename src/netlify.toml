[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"

[[redirects]]
  from = "/api/*"
  to = "https://shakti-toys-backend.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
```

**Step 2:** In Netlify dashboard → **Environment Variables**, set:
```
VITE_API_URL = /api