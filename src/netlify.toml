[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"

[[redirects]]
  from = "/api/*"
  to = "https://shakti-toys-backend.onrender.com/api/:splat"
  status = 200
  force = true

# ✅ Add this — handles React Router refreshes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200